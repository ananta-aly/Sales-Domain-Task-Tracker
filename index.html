<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Domain Task Tracking Report</title>

<style>
:root {
  --black:#000;
  --green:#86BC25;
  --gray:#5f6368;
  --light:#f7f7f7;
  --border:#d8d8d8;
}

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#fff;
}

.page {
  width:90%;
  margin:auto;
  padding:30px 0;
}

.eyebrow {
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#666;
  margin-bottom:20px;
}

.dot {
  display:inline-block;
  width:8px;
  height:8px;
  background:var(--green);
  border-radius:50%;
  margin-right:10px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

h1 {
  font-size:56px;
  font-weight:300;
  margin:0;
}

h1 em {
  color:var(--green);
  font-family:Georgia, serif;
}

.meta {
  text-align:right;
}

.circle {
  width:90px;
  height:90px;
  border:3px solid var(--green);
  border-radius:50%;
}

.divider {
  border-top:3px solid black;
  margin:30px 0;
}

/* Upload cards */

.actions {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:30px;
}

.card {
  border:2px dashed var(--border);
  padding:25px;
  display:flex;
  gap:20px;
  align-items:center;
  cursor:pointer;
}

.card:hover {
  border-color:var(--green);
  background:#fbfdf8;
}

.icon {
  width:50px;
  height:50px;
  border:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.card h3 {
  margin:0;
  font-size:14px;
  text-transform:uppercase;
  color:var(--gray);
}

.card p {
  margin:5px 0 0;
  font-size:18px;
}

/* Form panels */

.panel {
  display:none;
  border-left:5px solid var(--green);
  border:1px solid var(--border);
  padding:20px;
  margin-bottom:20px;
}

.panel.active { display:block; }

.grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

input, select {
  padding:8px;
  border:1px solid var(--border);
  width:100%;
}

button {
  margin-top:15px;
  padding:10px 15px;
  background:var(--green);
  color:white;
  border:none;
  cursor:pointer;
}

/* Table */

table {
  width:100%;
  border-collapse:collapse;
}

th {
  text-align:left;
  padding:10px;
  font-size:12px;
  text-transform:uppercase;
  border-bottom:1px solid #ddd;
}

td {
  padding:12px;
  border-bottom:1px solid #eee;
}

.rag {
  padding:4px 8px;
  color:#fff;
  font-size:12px;
}

.green {background:var(--green);}
.yellow {background:#f2c94c;color:#000;}
.red {background:#d92d20;}

</style>
</head>

<body>

<div class="page">

<div class="eyebrow"><span class="dot"></span>Deloitte · Sales Domain · FY26 - P12</div>

<div class="header">
  <h1>Task Tracking <em>Report</em></h1>
  <div class="meta">
    <strong>Week of Apr 24, 2026</strong><br>
    Generated automatically
  </div>
  <div class="circle"></div>
</div>

<hr class="divider"/>

<!-- Cards -->

<div class="actions">
  <div class="card" onclick="openPanel('taskPanel')">
    <div class="icon">＋</div>
    <div>
      <h3>Task Intake</h3>
      <p>Add new task</p>
    </div>
  </div>

  <div class="card" onclick="openPanel('trackingPanel')">
    <div class="icon">↥</div>
    <div>
      <h3>Task Tracking Data</h3>
      <p>Add health & progress</p>
    </div>
  </div>
</div>

<!-- Task Form -->

<div id="taskPanel" class="panel">
  <div class="grid">
    <input id="taskName" placeholder="Task">
    <input id="owner" placeholder="Owner">
    <input id="date" type="date">
    <select id="source">
      <option>Loop</option>
      <option>Planner</option>
    </select>
    <select id="status">
      <option>Green</option>
      <option>Yellow</option>
      <option>Red</option>
    </select>
  </div>
  <button onclick="saveTask()">Save Task</button>
</div>

<!-- Tracking Form -->

<div id="trackingPanel" class="panel">
  <div class="grid">
    <input id="tTask" placeholder="Task">
    <input id="tOwner" placeholder="Owner">
    <select id="tStatus">
      <option>Green</option>
      <option>Yellow</option>
      <option>Red</option>
    </select>
    <input id="progress" placeholder="Progress %">
    <input id="next" placeholder="Next Step">
  </div>
  <button onclick="saveTracking()">Save Tracking</button>
</div>

<!-- Table -->

<table>
<thead>
<tr>
<th>Source</th>
<th>Task</th>
<th>Owner</th>
<th>Due</th>
<th>Status</th>
<th>Progress</th>
<th>Next Step</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

</div>

<script>
let tasks=[];

function openPanel(id){
  document.getElementById('taskPanel').classList.remove('active');
  document.getElementById('trackingPanel').classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function saveTask(){
  tasks.unshift({
    source:source.value,
    task:taskName.value,
    owner:owner.value,
    date:date.value,
    status:status.value,
    progress:"-",
    next:"-"
  });
  render();
}

function saveTracking(){
  tasks.unshift({
    source:"Tracking",
    task:tTask.value,
    owner:tOwner.value,
    date:"-",
    status:tStatus.value,
    progress:progress.value,
    next:next.value
  });
  render();
}

function render(){
  body.innerHTML="";
  tasks.forEach(t=>{
    body.innerHTML+=`
    <tr>
      <td>${t.source}</td>
      <td>${t.task}</td>
      <td>${t.owner}</td>
      <td>${t.date}</td>
      <td><span class="rag ${t.status.toLowerCase()}">${t.status}</span></td>
      <td>${t.progress}</td>
      <td>${t.next}</td>
    </tr>`;
  });
}
</script>

</body>
</html>
