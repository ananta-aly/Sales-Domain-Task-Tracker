<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Domain Task Tracking Report</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
:root {
  --black:#000;
  --green:#86BC25;
  --gray:#5f6368;
  --light:#f7f7f7;
  --border:#d8d8d8;
}

body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
}

.page {
  width:90%;
  margin:auto;
  padding:30px 0;
}

/* ✅ FIXED WRAPPING */
th, td {
  white-space: normal;
  overflow-wrap: break-word;
  word-break: break-word;
  padding:14px;
}

/* Table */
table {
  width:100%;
  border-collapse:collapse;
  border-top:2px solid #000;
  table-layout:fixed;
}

th {
  text-transform:uppercase;
  font-size:12px;
  color:#666;
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
}

h1 {
  font-size:48px;
  font-weight:300;
}

h1 em {
  color:var(--green);
  font-weight:700;
}

/* Cards */
.actions {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card {
  border:2px dashed var(--border);
  padding:25px;
  cursor:pointer;
}

/* Week selector */
.reference-week {
  margin-bottom:20px;
}

.reference-week label {
  font-size:12px;
  font-weight:700;
  display:block;
}

/* ✅ UPDATED TEXT */
.reference-week .helper-text {
  font-size:13px;
  color:#666;
}

/* Buttons */
button {
  background:var(--green);
  color:#fff;
  padding:10px;
  border:none;
  cursor:pointer;
}

.download-button {
  background:#000;
}

/* Filters */
.filter-bar {
  margin:20px 0;
  display:grid;
  grid-template-columns:1fr 1fr 1fr auto auto;
  gap:10px;
}

/* Trend Circle */
.circle {
  width:80px;
  height:80px;
  border-radius:50%;
  border:3px solid var(--green);
}
</style>
</head>

<body>
<div class="page">

<div class="header">
  <h1>Task Tracking <em>Report</em></h1>
  <div class="circle" id="trendCircle"></div>
</div>

<hr>

<!-- ✅ WEEK SELECTOR -->
<div class="reference-week">
  <label>Due Date Reference Week</label>
  <input id="referenceWeekStart" type="date" onchange="render()" />
  <div class="helper-text">
    Select the Monday of the week this Loop / Planner update applies to.
  </div>
</div>

<!-- Upload -->
<div class="actions">
  <div class="card" onclick="document.getElementById('file').click()">
    Upload Tasks (PDF / Excel / CSV)
  </div>
</div>

<input id="file" type="file" accept=".pdf,.csv,.xlsx" style="display:none" onchange="handleFile(event)">

<!-- Filters -->
<div class="filter-bar">
  <input id="ownerFilter" placeholder="Owner" oninput="render()">
  <input id="dueFilter" type="date" onchange="render()">
  <select id="progressFilter" onchange="render()">
    <option value="">All</option>
    <option>Not Started</option>
    <option>In Progress</option>
    <option>Complete</option>
  </select>
  <button onclick="clearFilters()">Clear Filters</button>
  <button onclick="clearData()">Clear Data</button>
</div>

<!-- Table -->
<table>
<thead>
<tr>
<th>Task</th>
<th>Owner</th>
<th>Due Date</th>
<th>Progress</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<!-- Download -->
<div style="margin-top:20px; text-align:right;">
  <button class="download-button" onclick="downloadReport()">Download Report</button>
</div>

</div>

<script>
let tasks = [];

/* DATE LOGIC */
function getWeekMonday(){
  const selected = document.getElementById("referenceWeekStart").value;
  if(selected) return new Date(selected);

  const d = new Date();
  const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
  d.setDate(d.getDate() + diff);
  return d;
}

function format(d){
  return (d.getMonth()+1).toString().padStart(2,"0") + "/" +
         d.getDate().toString().padStart(2,"0") + "/" +
         d.getFullYear().toString().slice(-2);
}

function normalizeDate(val){
  if(!val) return "";
  val = val.toLowerCase();

  const base = getWeekMonday();

  if(val === "asap" || val === "today") return format(base);

  if(val === "tomorrow"){
    let t = new Date();
    t.setDate(t.getDate()+1);
    return format(t);
  }

  const map = {mon:0,tue:1,wed:2,thu:3,thurs:3,fri:4};
  if(map[val] !== undefined){
    let d = new Date(base);
    d.setDate(d.getDate()+map[val]);
    return format(d);
  }

  if(val.match(/^\d{1,2}\/\d{1,2}$/)){
    let [m,d] = val.split("/");
    return m.padStart(2,"0")+"/"+d.padStart(2,"0")+"/26";
  }

  return val;
}

/* RENDER */
function render(){
  const body = document.getElementById("body");
  body.innerHTML="";

  tasks.forEach(t=>{
    body.innerHTML += `
      <tr>
        <td>${t.task}</td>
        <td>${t.owner}</td>
        <td>${normalizeDate(t.date)}</td>
        <td>${t.progress}</td>
      </tr>`;
  });
}

/* FILE */
function handleFile(e){
  alert("File upload logic already exists in your previous version.");
}

/* UTIL */
function clearFilters(){
  ownerFilter.value="";
  dueFilter.value="";
  progressFilter.value="";
  render();
}

function clearData(){
  tasks=[];
  render();
}

/* DOWNLOAD */
function downloadReport(){
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "task-report.html";
  a.click();
}
</script>

</body>
</html>
