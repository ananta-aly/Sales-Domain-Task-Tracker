<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deloitte Sales Domain Task Tracker</title>
  <style>
    :root {
      --deloitte-black: #000000;
      --deloitte-green: #86BC25;
      --light-gray: #f5f5f5;
      --mid-gray: #d0d0d0;
      --dark-gray: #333333;
      --green-bg: #e8f5dc;
      --yellow-bg: #fff4cc;
      --red-bg: #fde2e2;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light-gray);
      color: var(--deloitte-black);
    }

    header {
      background: var(--deloitte-black);
      color: white;
      padding: 22px 28px;
      border-bottom: 6px solid var(--deloitte-green);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      margin: 8px 0 0;
      color: #dddddd;
      font-size: 14px;
    }

    main {
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .primary-button {
      background: var(--deloitte-green);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .primary-button:hover {
      filter: brightness(0.95);
    }

    .task-form {
      display: none;
      background: white;
      border: 1px solid var(--mid-gray);
      border-left: 6px solid var(--deloitte-green);
      padding: 18px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .task-form.active {
      display: block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--dark-gray);
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--mid-gray);
      border-radius: 5px;
      padding: 10px;
      font-size: 14px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .secondary-button {
      background: white;
      color: var(--deloitte-black);
      border: 1px solid var(--mid-gray);
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .summary {
      font-size: 14px;
      color: var(--dark-gray);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: var(--deloitte-black);
      color: white;
      text-align: left;
      padding: 12px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    td {
      border-bottom: 1px solid #eeeeee;
      padding: 12px;
      font-size: 14px;
      vertical-align: top;
    }

    tr.green td:first-child { border-left: 6px solid var(--deloitte-green); }
    tr.yellow td:first-child { border-left: 6px solid #f5c542; }
    tr.red td:first-child { border-left: 6px solid #d32f2f; }

    .rag {
      border-radius: 20px;
      padding: 5px 10px;
      font-weight: 700;
      display: inline-block;
      font-size: 12px;
    }

    .rag.green { background: var(--green-bg); color: #2d6a00; }
    .rag.yellow { background: var(--yellow-bg); color: #7a5a00; }
    .rag.red { background: var(--red-bg); color: #8a0000; }

    @media (max-width: 900px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Deloitte Sales Domain Task Tracker</h1>
    <p>Unified view of Loop actions and Planner tasks with simple forward-facing task intake.</p>
  </header>

  <main>
    <div class="toolbar">
      <button class="primary-button" onclick="toggleTaskForm()">+ Add Task</button>
      <div class="summary" id="taskCount">0 tasks captured</div>
    </div>

    <section class="task-form" id="taskForm">
      <strong>New Task Intake</strong>
      <div class="form-grid">
        <div>
          <label for="taskName">Task</label>
          <input id="taskName" type="text" placeholder="Enter task description" />
        </div>
        <div>
          <label for="taskOwner">Owner</label>
          <input id="taskOwner" type="text" placeholder="Owner name" />
        </div>
        <div>
          <label for="taskDueDate">Due Date</label>
          <input id="taskDueDate" type="date" />
        </div>
        <div>
          <label for="taskSource">Source</label>
          <select id="taskSource">
            <option value="Loop">Loop</option>
            <option value="Planner">Planner</option>
            <option value="Manual Intake">Manual Intake</option>
          </select>
        </div>
        <div>
          <label for="taskStatus">Status</label>
          <select id="taskStatus">
            <option value="Green">Green</option>
            <option value="Yellow">Yellow</option>
            <option value="Red">Red</option>
            <option value="Not Started">Not Started</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button class="primary-button" onclick="addTask()">Save Task</button>
        <button class="secondary-button" onclick="clearForm()">Clear</button>
        <button class="secondary-button" onclick="toggleTaskForm()">Cancel</button>
      </div>
    </section>

    <table id="taskTable">
      <thead>
        <tr>
          <th>Source</th>
          <th>Task</th>
          <th>Owner</th>
          <th>Due Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="taskBody"></tbody>
    </table>
  </main>

  <script>
    let taskCounter = 0;

    function toggleTaskForm() {
      document.getElementById("taskForm").classList.toggle("active");
      document.getElementById("taskName").focus();
    }

    function clearForm() {
      document.getElementById("taskName").value = "";
      document.getElementById("taskOwner").value = "";
      document.getElementById("taskDueDate").value = "";
      document.getElementById("taskSource").value = "Loop";
      document.getElementById("taskStatus").value = "Green";
    }

    function addTask() {
      const taskName = document.getElementById("taskName").value.trim();
      const owner = document.getElementById("taskOwner").value.trim();
      const dueDate = document.getElementById("taskDueDate").value;
      const source = document.getElementById("taskSource").value;
      const status = document.getElementById("taskStatus").value;

      if (!taskName) {
        alert("Please enter a task description.");
        return;
      }

      const tbody = document.getElementById("taskBody");
      const row = document.createElement("tr");

      const statusClass = status.toLowerCase().replace(" ", "-");
      if (["green", "yellow", "red"].includes(statusClass)) {
        row.classList.add(statusClass);
      }

      row.innerHTML = `
        <td>${source}</td>
        <td>${taskName}</td>
        <td>${owner || "TBD"}</td>
        <td>${dueDate || "TBD"}</td>
        <td><span class="rag ${["green", "yellow", "red"].includes(statusClass) ? statusClass : ""}">${status}</span></td>
      `;

      tbody.prepend(row);
      taskCounter += 1;
      document.getElementById("taskCount").textContent = `${taskCounter} task${taskCounter === 1 ? "" : "s"} captured`;
      clearForm();
      document.getElementById("taskForm").classList.remove("active");
    }
  </script>
</body>
</html>
